services:
  - type: web
    name: discord-voice-selfbot
    runtime: python
    plan: free
    buildCommand: pip uninstall -y discord; pip install --no-cache-dir -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: VOICE_CHANNEL_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: SELF_MUTE
        value: "false"
      - key: SELF_DEAF
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11"
